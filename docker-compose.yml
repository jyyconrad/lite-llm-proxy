version: '3.8'

services:
  # PostgreSQL数据库
  db:
    image: postgres:15
    platform: linux/arm64
    container_name: litellm_db
    restart: unless-stopped
    profiles:
      - db
    environment:
      POSTGRES_DB: litellm_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin1234
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d litellm_gateway"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis缓存
  redis:
    image: redis:7-alpine
    platform: linux/arm64
    container_name: litellm_redis
    restart: unless-stopped
    profiles:
      - redis
    command: redis-server --requirepass admin1234
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 主应用程序
  app:
    image: llm-proxy-single:${TAG}
    container_name: litellm_app
    restart: unless-stopped
    ports:
      - ${PORT-8000}:${PORT-8000}
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:admin1234@db:5432/litellm_gateway}
      REDIS_URL: ${REDIS_URL:-redis://:admin1234@redis:6379}
    volumes:
      - ./logs:/app/logs
      - ./dist:/app/dist
      - ./litellm_config.yaml:/app/litellm_config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
